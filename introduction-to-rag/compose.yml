services:
  rag:
    image: rag-chat-api
    container_name: rag_chat_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    networks:
      - rag-network
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  postgres:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  rag-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  uploads: